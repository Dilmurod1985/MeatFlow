services:
  # Python Web Service
  - type: web
    name: meatflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DATABASE_URL
        fromDatabase:
          name: meatflow-db
          property: connectionString

databases:
  - name: meatflow-db
    databaseName: meatflow
    user: meatflow_user
    plan: free
